spring:
  application:
    name: invision
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 60MB
  datasource:
    url: ${POSTGRES_URL}
    username: postgres
    password: ${POSTGRES_SECRET}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  s3:
    bucket-name: media-bucket-quizshare
  region: eu-north-1

ai:
  evaluator:
    base-url: http://127.0.0.1:8000